apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: student-app
  template:
    metadata:
      labels:
        app: student-app
    spec:
      containers:
      - name: student-app
        image: 476114128927.dkr.ecr.ap-south-1.amazonaws.com/student-app:latest
        ports:
        - containerPort: 8085
        env:
        - name: DB_HOST
          value: "test-db.cbgscsu0apzj.ap-south-1.rds.amazonaws.com"
        - name: DB_USER
          value: "admin"
        - name: DB_PASS
          value: "akashthavare"
